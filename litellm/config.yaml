model_list:
 
  - model_name: simple-tier
 
    litellm_params:
      model: ollama/qwen2.5:1.5b
      api_base: os.environ/OLLAMA_BASE_URL
 
    model_info:
      input_cost_per_token: 0.00000015
      output_cost_per_token: 0.00000015
 
 
  - model_name: standard-tier
 
    litellm_params:
      model: ollama/llama3.2:3b
      api_base: os.environ/OLLAMA_BASE_URL
 
    model_info:
      input_cost_per_token: 0.00000030
      output_cost_per_token: 0.00000030
 
 
  - model_name: complex-tier
 
    litellm_params:
      model: ollama/llama3.2:3b
      api_base: os.environ/OLLAMA_BASE_URL
 
    model_info:
      input_cost_per_token: 0.00000030
      output_cost_per_token: 0.00000030
 
 
 
router_settings:
 
  routing_strategy: least-busy
 
  allowed_fails: 3
  cooldown_time: 60
 
  fallbacks:
 
    - complex-tier:
        - standard-tier
        - simple-tier
 
    - standard-tier:
        - simple-tier
 
 
 
litellm_settings:
 
  success_callback:
    - langfuse
 
  langfuse_default_tags:
    - "employee-ai"
 
  set_verbose:
    true
 
 
 
general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY