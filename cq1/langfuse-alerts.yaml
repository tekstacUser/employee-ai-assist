# cq1/langfuse-alerts.yaml
#
# Alert definitions this stack should raise. This is a design artifact —
# in this on-prem deployment, LangFuse does not auto-import this file, so
# once the stack is running you additionally mirror these into the
# LangFuse UI (Settings > Alerts). This file is the canonical record of
# what each alert should be, so it can be reviewed and graded.
#
# Keep every threshold consistent with the values you chose in
# litellm/config.yaml (allowed_fails, cooldown_time, per-BU budgets) —
# an alert that can never fire, or that fires constantly, is wrong even
# if the YAML is syntactically valid.

alerts:

  # --- Gap 1 (general latency alert) -----------------------------------
  # Fires when overall response latency degrades, independent of which
  # tier is involved. Pick a threshold that a genuinely slow VM would
  # breach, but that normal Complex-tier traffic would not.
  - name: p99-latency-breach
    metric:                      # TODO: e.g. "latency_p99_ms"
    threshold:                   # TODO: milliseconds — should sit above your normal Complex-tier p99, but well below "unusable"
    evaluation_window_minutes:   # TODO
    escalation_action:           # TODO: e.g. "page on-call via Slack webhook"

  # --- Gap 2 (general cost alert) ---------------------------------------
  # Fires when any single business unit's spend accelerates abnormally,
  # ahead of it actually exhausting its budget.
  - name: per-bu-cost-spike
    metric:                      # TODO: e.g. "cost_usd_equivalent_per_bu"
    threshold:                   # TODO: should reference the max_budget you set per BU in litellm/config.yaml (Gap 10) — e.g. a % of that budget, or a spend-rate figure
    evaluation_window_minutes:   # TODO
    escalation_action:           # TODO

  # --- Gap 3 — AP1 trigger ----------------------------------------------
  # Scenario AP1: the Complex-tier endpoint returns errors for 4 straight
  # minutes, the circuit breaker (allowed_fails/cooldown_time in
  # config.yaml) does not trip, and requests start queuing.
  # This alert exists as the safety net for exactly that gap.
  - name: ap1-complex-tier-error-rate
    metric: error_rate                              # pre-filled
    threshold:                   # TODO: % error rate that should never persist this long on a healthy tier
    evaluation_window_minutes:   # TODO: should be short enough to catch a 4-minute outage before it does more damage
    escalation_action: trigger-dr-runbook-step-3     # pre-filled

  # --- Gap 4 — AP2 trigger ----------------------------------------------
  # Scenario AP2: one business unit's cost spikes 340% in 90 minutes
  # (a prompt-injection loop), and normal budget throttling doesn't
  # activate in time. This alert is the backstop for that failure.
  - name: ap2-bu-cost-spike-override
    metric: cost_usd_equivalent_per_bu               # pre-filled
    threshold:                   # TODO: must reference the per-BU max_budget you set in litellm/config.yaml (Gap 10) — pick a spend/time figure a 340%-in-90-minutes spike would clearly breach
    evaluation_window_minutes: 90                     # pre-filled
    escalation_action: trigger-dr-runbook-step-3      # pre-filled

  # --- Gap 5 — AP3 trigger ----------------------------------------------
  # Scenario AP3: a model swap causes hallucination rate to climb from
  # 4% to 19% within 2 hours. This alert must fire well before 19%.
  - name: ap3-hallucination-rate-trend
    metric: hallucination_rate                        # pre-filled
    threshold:                   # TODO: a rate (or rate increase) clearly below 19%, so it fires with room to react
    evaluation_window_minutes:   # TODO: should be short enough to catch drift developing over a 2-hour window
    escalation_action: trigger-dr-runbook-step-7      # pre-filled
